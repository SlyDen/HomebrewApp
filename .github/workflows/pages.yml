name: Publish DocC

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build DocC archive
        working-directory: app/HomebrewApp
        run: |
          set -euo pipefail

          derived_data_path="${RUNNER_TEMP}/DerivedData"
          hosting_base_path="${{ steps.pages.outputs.base_path }}"

          # The hosted runner currently uses Xcode 26.5, which cannot open
          # Xcode 27's project object version. This checkout is ephemeral.
          sed -i '' 's/^\tobjectVersion = 110;$/\tobjectVersion = 77;/' \
            HomebrewApp.xcodeproj/project.pbxproj

          xcodebuild docbuild \
            -project HomebrewApp.xcodeproj \
            -scheme HomebrewApp \
            -destination 'generic/platform=macOS' \
            -derivedDataPath "${derived_data_path}" \
            DOCC_HOSTING_BASE_PATH="${hosting_base_path}" \
            CODE_SIGNING_ALLOWED=NO

          archive_path="$(find "${derived_data_path}" -type d -name 'HomebrewApp.doccarchive' -print -quit)"
          if [[ -z "${archive_path}" ]]; then
            echo "HomebrewApp.doccarchive was not produced." >&2
            exit 1
          fi

          output_path="${RUNNER_TEMP}/site"
          xcrun docc process-archive transform-for-static-hosting "${archive_path}" \
            --output-path "${output_path}" \
            --hosting-base-path "${hosting_base_path}"

          cp "${GITHUB_WORKSPACE}/.github/pages/docc-root-route.js" \
            "${output_path}/docc-root-route.js"

          root_route_script_path="${hosting_base_path}/docc-root-route.js"
          sed -i '' \
            "s#</head>#<script src=\"${root_route_script_path}\"></script></head>#" \
            "${output_path}/index.html"

          touch "${output_path}/.nojekyll"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ runner.temp }}/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
